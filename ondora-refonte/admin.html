<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ondora — Admin Projets</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #12121a;
      --border:   #2a2a3a;
      --accent:   #7c5cfc;
      --accent2:  #c45cfc;
      --text:     #e8e8f0;
      --muted:    #6b6b85;
      --danger:   #fc5c7d;
      --success:  #5cfca8;
      --card-bg:  #16161f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.4rem; margin-bottom: .4rem; }
    .login-box p  { color: var(--muted); font-size: .85rem; margin-bottom: 1.8rem; }
    .login-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .7rem 1rem;
      font-size: .95rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-error { color: var(--danger); font-size: .83rem; margin-bottom: .8rem; display: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .6rem 1.2rem;
      border-radius: 8px;
      border: none;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover   { opacity: .85; }
    .btn:active  { transform: scale(.97); }
    .btn--primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; width: 100%; justify-content: center; }
    .btn--ghost   { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn--danger  { background: rgba(252,92,125,.15); border: 1px solid rgba(252,92,125,.3); color: var(--danger); }
    .btn--success { background: rgba(92,252,168,.15); border: 1px solid rgba(92,252,168,.3); color: var(--success); }
    .btn--sm      { padding: .4rem .8rem; font-size: .8rem; }

    /* ── App layout ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    header.adm-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .adm-header__left { display: flex; align-items: center; gap: 1rem; }
    .adm-logo { font-size: 1.1rem; font-weight: 700; letter-spacing: .03em; }
    .adm-logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .adm-badge {
      background: rgba(124,92,252,.2);
      border: 1px solid rgba(124,92,252,.35);
      color: var(--accent);
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 20px;
    }
    .adm-header__right { display: flex; gap: .6rem; align-items: center; }

    .counter {
      font-size: .85rem;
      color: var(--muted);
    }
    .counter strong { color: var(--text); }
    .counter.full   { color: var(--danger); }

    main.adm-main {
      flex: 1;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .adm-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .adm-toolbar h2 { font-size: 1.1rem; font-weight: 600; }

    /* ── Project grid ── */
    .adm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
    }

    .adm-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .2s;
      cursor: grab;
      position: relative;
    }
    .adm-card:hover  { border-color: var(--accent); }
    .adm-card.dragging { opacity: .4; cursor: grabbing; }
    .adm-card.drag-over { border-color: var(--accent2); box-shadow: 0 0 0 2px var(--accent2); }

    .adm-card__thumb {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: #000;
    }
    .adm-card__thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .adm-card:hover .adm-card__thumb img { transform: scale(1.04); }
    .adm-card__num {
      position: absolute;
      top: .5rem;
      left: .5rem;
      background: rgba(0,0,0,.7);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .45rem;
      border-radius: 4px;
    }

    .adm-card__body {
      padding: .85rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .adm-card__title { font-size: .95rem; font-weight: 600; line-height: 1.3; }
    .adm-card__meta  { font-size: .75rem; color: var(--muted); display: flex; gap: .5rem; flex-wrap: wrap; }
    .adm-card__tag   {
      background: rgba(124,92,252,.15);
      color: var(--accent);
      font-size: .68rem;
      font-weight: 600;
      padding: .1rem .45rem;
      border-radius: 4px;
    }

    .adm-card__actions {
      display: flex;
      gap: .5rem;
      padding: .7rem .85rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .adm-card__actions .btn { flex: 1; justify-content: center; }

    /* Placeholder "Ajouter" */
    .adm-card--add {
      border: 2px dashed var(--border);
      background: transparent;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      cursor: pointer;
      color: var(--muted);
      font-size: .9rem;
      gap: .5rem;
      transition: border-color .2s, color .2s;
      flex-direction: column;
    }
    .adm-card--add:hover { border-color: var(--accent); color: var(--accent); }
    .adm-card--add svg   { width: 2rem; height: 2rem; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 580px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal__header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal__header h3 { font-size: 1rem; font-weight: 600; }
    .modal__close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.3rem;
      line-height: 1;
      padding: .2rem;
      transition: color .15s;
    }
    .modal__close:hover { color: var(--text); }
    .modal__body   { padding: 1.5rem; overflow-y: auto; flex: 1; }
    .modal__footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: .7rem; justify-content: flex-end; }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .4rem;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: .65rem .9rem;
      font-size: .9rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; }

    .thumb-preview {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 8px;
      background: #000;
      display: block;
      margin-top: .5rem;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .85rem 1.2rem;
      font-size: .88rem;
      z-index: 999;
      transform: translateY(6rem);
      opacity: 0;
      transition: transform .3s, opacity .3s;
      pointer-events: none;
      max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast--success { border-color: rgba(92,252,168,.4); color: var(--success); }
    .toast--error   { border-color: rgba(252,92,125,.4); color: var(--danger); }
  </style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen">
  <div class="login-box">
    <h1>Ondora <span style="background:linear-gradient(135deg,#7c5cfc,#c45cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Admin</span></h1>
    <p>Accès réservé — Section Projets</p>
    <input type="password" id="pwInput" placeholder="Mot de passe" autocomplete="current-password">
    <div class="login-error" id="loginError">Mot de passe incorrect.</div>
    <button class="btn btn--primary" id="loginBtn">Connexion</button>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">

  <header class="adm-header">
    <div class="adm-header__left">
      <div class="adm-logo"><span>Ondora</span> Admin</div>
      <span class="adm-badge">Projets</span>
    </div>
    <div class="adm-header__right">
      <span class="counter" id="counter">— / 10 projets</span>
      <button class="btn btn--success" id="exportBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exporter projects.json
      </button>
      <button class="btn btn--ghost btn--sm" id="logoutBtn">Déconnexion</button>
    </div>
  </header>

  <main class="adm-main">
    <div class="adm-toolbar">
      <h2>Gérer les projets</h2>
      <p style="font-size:.82rem;color:var(--muted)">Glisse-dépose pour réordonner · Maximum 10 projets</p>
    </div>
    <div class="adm-grid" id="admGrid"></div>
  </main>

</div>

<!-- ══════════ MODAL EDIT / ADD ══════════ -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal__header">
      <h3 id="modalTitle">Modifier le projet</h3>
      <button class="modal__close" id="modalClose">&times;</button>
    </div>
    <div class="modal__body">
      <div class="form-group">
        <label>ID Vidéo YouTube</label>
        <input type="text" id="fVideo" placeholder="ex: HuRDI3pedSk">
        <img id="thumbPreview" class="thumb-preview" src="" alt="">
      </div>
      <div class="form-group">
        <label>Titre</label>
        <input type="text" id="fTitle" placeholder="Titre du projet">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Format</label>
          <input type="text" id="fFormat" placeholder="ex: Documentaire" list="formatList">
          <datalist id="formatList">
            <option value="Documentaire">
            <option value="Court-métrage Fiction">
            <option value="Court-métrage">
            <option value="Bande-Annonce">
            <option value="Événement">
          </datalist>
        </div>
        <div class="form-group">
          <label>Année</label>
          <input type="text" id="fAnnee" placeholder="ex: 2024">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Durée</label>
          <input type="text" id="fDuree" placeholder="ex: 18min">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Réalisation</label>
          <input type="text" id="fReal" placeholder="ex: Nicolas Kieffer">
        </div>
      </div>
      <div class="form-group">
        <label>Production</label>
        <input type="text" id="fProd" placeholder="ex: Utopia Collectif Cinéma">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="fDesc" placeholder="Synopsis ou description du projet…"></textarea>
      </div>
      <details style="margin-top:.5rem">
        <summary style="font-size:.8rem;color:var(--muted);cursor:pointer;user-select:none">Options avancées (zoom image)</summary>
        <div style="margin-top:.8rem">
          <div class="form-row">
            <div class="form-group">
              <label>Background-size</label>
              <input type="text" id="fBgSize" placeholder="ex: 185%">
            </div>
            <div class="form-group">
              <label>Background-position</label>
              <input type="text" id="fBgPosition" placeholder="ex: center 12%">
            </div>
          </div>
        </div>
      </details>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" id="modalCancel">Annuler</button>
      <button class="btn btn--primary" id="modalSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- ══════════ CONFIRM DELETE ══════════ -->
<div class="modal-backdrop" id="confirmBackdrop">
  <div class="modal" style="max-width:400px">
    <div class="modal__header">
      <h3>Supprimer le projet ?</h3>
      <button class="modal__close" id="confirmClose">&times;</button>
    </div>
    <div class="modal__body">
      <p id="confirmText" style="color:var(--muted);font-size:.9rem;line-height:1.5"></p>
    </div>
    <div class="modal__footer">
      <button class="btn btn--ghost" id="confirmCancel">Annuler</button>
      <button class="btn btn--danger" id="confirmDelete">Supprimer</button>
    </div>
  </div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="toast" id="toast"></div>

<script src="admin.js"></script>
</body>
</html>
